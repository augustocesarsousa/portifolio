<header class="bg-dark-bg text-light-text sticky top-0 z-50 shadow-md">
  <p class="bg-red-600 text-black text-center font-bold">Projeto em construção</p>
  <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
    <button
      href="home"
      (click)="scrollToSection('home'); $event.stopPropagation()"
      class="text-2xl font-bold tracking-tighter"
    >
      ACSousa<span class="text-accent-yellow">.DEV</span>
    </button>

    <div class="hidden lg:flex items-center space-x-8">
      @for (item of navItems; track item.name) {
        <button
          type="button"
          (click)="scrollToSection(item.link); $event.stopPropagation()"
          class="hover:text-accent-yellow transition-colors duration-300"
        >
          {{ item.name }}
        </button>
      }
      <a
        href="cv.pdf"
        download="Curriculo_Augusto_Cesar.pdf"
        class="bg-accent-yellow text-dark-bg font-bold py-2 px-5 rounded-lg hover:brightness-110 transition-all inline-block text-center"
      >
        Download CV
      </a>
    </div>

    <div class="lg:hidden flex items-center">
      <button (click)="toggleMenu()" class="text-light-text focus:outline-none">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-8 w-8"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16m-7 6h7"
          />
        </svg>
      </button>
    </div>
  </nav>

  @if (isMenuOpen) {
    <div
      class="md:hidden bg-dark-bg border-t border-purple-900/30 w-full absolute left-0 top-full shadow-2xl z-9999 pointer-events-auto"
    >
      <div class="flex flex-col p-6 space-y-2 relative">
        @for (item of navItems; track item.name) {
          <button
            type="button"
            (click)="scrollToSection(item.link); $event.stopPropagation()"
            class="w-full py-4 text-left text-lg border-b border-purple-900/10 last:border-none hover:text-accent-yellow text-light-text active:bg-purple-900/20"
          >
            {{ item.name }}
          </button>
        }
        <div class="pt-4">
          <a
            href="cv.pdf"
            download="Curriculo_Augusto_Cesar.pdf"
            class="block w-full bg-accent-yellow text-dark-bg font-bold py-4 rounded-lg text-center active:scale-95 transition-transform"
          >
            Download CV
          </a>
        </div>
      </div>
    </div>
  }
</header>
