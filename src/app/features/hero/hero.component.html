<section
  id="home"
  appScrollReveal
  class="bg-dark-bg text-light-text min-h-screen flex items-center justify-center overflow-hidden"
>
  <div
    class="container mx-auto px-6 py-12 flex flex-col lg:flex-row items-center justify-between gap-10"
  >
    <div class="w-full lg:w-1/2 flex justify-center lg:justify order-1 lg:order-2">
      <div class="relative group">
        <div
          class="absolute -inset-1 bg-linear-to-r from-accent-yellow to-purple-600 rounded-full blur opacity-20 group-hover:opacity-40 transition duration-1000"
        ></div>
        <img
          src="foto-perfil.jpg"
          alt="Augusto Cesar"
          class="relative w-56 h-56 md:w-72 md:h-72 2xl:w-105 2xl:h-105 rounded-full object-cover border-2 border-accent-yellow/20 shadow-2xl"
        />
      </div>
    </div>

    <div
      class="w-full lg:w-1/2 order-2 lg:order-1 text-center lg:text-left flex flex-col items-center lg:items-start"
    >
      <h2 class="text-accent-yellow font-mono text-lg mb-2 tracking-tight">
        &#123; Olá, eu sou &#125;
      </h2>

      <h1 class="text-4xl md:text-6xl 2xl:text-8xl font-black mb-6 tracking-tighter leading-tight">
        Augusto <span class="text-accent-yellow">Cesar</span>
      </h1>

      <p class="text-lg md:text-xl lg:text-2xl text-gray-400 mb-8 leading-relaxed max-w-2xl">
        Atuando com T.I. em transição de carreira para o
        <span class="text-light-text font-semibold">Desenvolvimento de Software</span>. Focado em
        construir sistemas com
        <span class="text-light-text border-b-2 border-accent-yellow/40">Java, Spring Boot</span> e
        interfaces modernas com
        <span class="text-light-text border-b-2 border-accent-yellow/40">Angular</span>.
      </p>

      <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
        <button
          type="button"
          (click)="scrollToSection('projetos'); $event.stopPropagation()"
          class="bg-accent-yellow text-dark-bg px-8 py-4 rounded-md font-bold hover:brightness-110 transition-all text-center shadow-lg shadow-yellow-950/20"
        >
          Ver Projetos
        </button>
        <button
          type="button"
          (click)="scrollToSection('contato'); $event.stopPropagation()"
          class="border border-accent-yellow text-accent-yellow px-8 py-4 rounded-md font-bold hover:bg-accent-yellow/5 transition-all text-center"
        >
          Contato
        </button>
      </div>

      <div
        class="mt-12 flex flex-wrap justify-center lg:justify-start gap-4 grayscale opacity-60 hover:grayscale-0 transition-all"
      >
        <span class="bg-purple-900/30 px-3 py-1 rounded border border-purple-500/30 text-sm"
          >Java</span
        >
        <span class="bg-purple-900/30 px-3 py-1 rounded border border-purple-500/30 text-sm"
          >Spring Boot</span
        >
        <span class="bg-purple-900/30 px-3 py-1 rounded border border-purple-500/30 text-sm"
          >Angular</span
        >
        <span class="bg-purple-900/30 px-3 py-1 rounded border border-purple-500/30 text-sm"
          >Docker</span
        >
      </div>
    </div>
  </div>
</section>
