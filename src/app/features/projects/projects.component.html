<section id="projetos" class="bg-dark-bg text-light-text py-20 border-t border-purple-900/20">
  <div class="container mx-auto px-6">
    <div class="flex items-center gap-4 mb-16">
      <h2 class="text-3xl md:text-4xl font-bold italic">
        <span class="text-accent-yellow">Projetos em Destaque</span>
      </h2>
      <div class="h-px bg-purple-900 grow"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      @for (project of projects; track project.title) {
        <div
          class="bg-[#1a022d] border border-purple-900/30 rounded-lg p-8 flex flex-col justify-between hover:border-accent-yellow/40 transition-all group"
        >
          <div>
            <div class="flex justify-between items-start mb-6">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-10 w-10 text-accent-yellow opacity-80"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"
                />
              </svg>
              <a
                [href]="project.githubUrl"
                target="_blank"
                class="flex border border-accent-yellow px-5 py-2 rounded text-accent-yellow hover:bg-accent-yellow/10 transition-colors"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"
                  />
                </svg>
                <span class="ml-1">Acesse</span>
              </a>
            </div>

            <h3
              class="text-2xl font-bold text-light-text mb-4 group-hover:text-accent-yellow transition-colors"
            >
              {{ project.title }}
            </h3>

            <p class="text-gray-400 mb-6 leading-relaxed">
              {{ project.description }}
            </p>

            <ul class="mb-8 space-y-2">
              @for (item of project.highlights; track item) {
                <li class="flex items-center gap-2 text-sm text-gray-300">
                  <span class="text-accent-yellow">▹</span> {{ item }}
                </li>
              }
            </ul>
          </div>

          <div class="flex flex-wrap gap-3 font-mono text-xs text-accent-yellow/80">
            @for (tech of project.technologies; track tech) {
              <span class="bg-purple-900/20 px-2 py-1 rounded border border-purple-500/20">{{
                tech
              }}</span>
            }
          </div>
        </div>
      }
    </div>

    <div class="mt-16 text-center">
      <a
        href="https://github.com/augustocesarsousa"
        target="_blank"
        class="inline-block border border-accent-yellow text-accent-yellow px-8 py-3 rounded hover:bg-accent-yellow/10 transition-all font-bold"
      >
        Ver mais no GitHub
      </a>
    </div>
  </div>
</section>
