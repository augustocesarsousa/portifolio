name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Angular
        run: npm run build -- --base-href="/portifolio/"

      - name: Deploy to GitHub Pages
        run: npx angular-cli-ghpages --dir=dist/portifolio/browser --repo=https://github.com/augustocesarsousa/portifolio.git
